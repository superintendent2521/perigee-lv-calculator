<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RP Preset Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#181b22;--surface2:#1f232c;--border:#282d38;--border2:#343b48;
  --accent:#88c657;--accent-dim:rgba(136,198,87,.12);--warn:#e09357;--danger:#e06c75;
  --text:#bec8d2;--text-dim:#5a6470;--text-bright:#e8f0f8;
  --mono:'JetBrains Mono','Consolas',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-size:14px;font-family:system-ui,sans-serif;overflow:hidden;}

/* HEADER */
#hdr{display:flex;align-items:center;gap:14px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
#hdr h1{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.18em;text-transform:uppercase;white-space:nowrap;}
#hdr .sep{flex:1;}
#fname{font-family:var(--mono);font-size:11px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px;}
#dirty-badge{font-family:var(--mono);font-size:10px;color:var(--warn);display:none;}

/* BUTTONS */
.btn{background:transparent;border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:5px 13px;cursor:pointer;transition:border-color .15s,color .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn:disabled{opacity:.35;pointer-events:none;}
.btn.primary{border-color:var(--accent);color:var(--accent);}
.btn.primary:hover{background:var(--accent-dim);}
.btn.danger{border-color:var(--danger);color:var(--danger);}
.btn.danger:hover{background:rgba(224,108,117,.1);}
.btn.sm{padding:3px 9px;font-size:9px;}

/* TABS */
#tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;}
.tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;cursor:pointer;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

/* LAYOUT */
#body{display:flex;flex:1;height:calc(100vh - 80px);overflow:hidden;}
.panel{display:flex;flex:1;overflow:hidden;}
.left-pane{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-right:1px solid var(--border);}
.list-toolbar{padding:8px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border);flex-shrink:0;}
.list-toolbar-row{display:flex;gap:6px;}
.list-search{flex:1;background:rgba(0,0,0,.35);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 8px;outline:none;}
.list-search:focus{border-color:var(--accent);}
.list-search::placeholder{color:var(--text-dim);}
.list-scroll{flex:1;overflow-y:auto;}
.right-pane{flex:1;overflow-y:auto;padding:20px 26px;background:var(--bg);}

/* LIST */
.cat-row{display:flex;align-items:center;padding:8px 10px 2px;gap:4px;}
.cat-label{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);flex:1;}
.cat-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;}
.cat-row:hover .cat-actions{opacity:1;}
.icon-btn{display:inline-flex;align-items:center;justify-content:center;background:transparent;border:none;color:var(--text-dim);cursor:pointer;padding:2px 4px;font-size:11px;line-height:1;}
.icon-btn:hover{color:var(--accent);}
.icon-btn.d:hover{color:var(--danger);}

.li{display:flex;align-items:center;padding:6px 12px 6px 20px;cursor:pointer;gap:8px;border-left:2px solid transparent;transition:background .1s;}
.li:hover{background:rgba(255,255,255,.04);}
.li.sel{background:var(--accent-dim);border-left-color:var(--accent);}
.li-name{flex:1;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-sub{font-family:var(--mono);font-size:9px;color:var(--text-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-del{opacity:0;font-size:11px;color:var(--danger);cursor:pointer;padding:0 2px;}
.li:hover .li-del,.li.sel .li-del{opacity:.5;}
.li-del:hover{opacity:1 !important;}

/* EDITOR */
.ed-title{font-family:var(--mono);font-size:13px;color:var(--text-bright);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.ed-subtitle{font-size:10px;color:var(--text-dim);margin-left:8px;}
.placeholder{color:var(--text-dim);font-family:var(--mono);font-size:11px;padding:40px;text-align:center;}
.no-file{color:var(--text-dim);font-family:var(--mono);font-size:11px;padding:60px;text-align:center;line-height:1.9;}
.no-file b{color:var(--accent);}

/* FORM */
.fs{margin-bottom:20px;}
.fs-title{font-family:var(--mono);font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.frow{display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap;align-items:flex-end;}
.ff{display:flex;flex-direction:column;gap:3px;}
.ff label{font-family:var(--mono);font-size:8px;letter-spacing:.07em;text-transform:uppercase;color:var(--text-dim);}
.ff input,.ff textarea,.ff select{background:rgba(0,0,0,.35);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:5px 8px;outline:none;min-width:0;}
.ff input:focus,.ff textarea:focus,.ff select:focus{border-color:var(--accent);}
.ff textarea{resize:vertical;line-height:1.5;}
.ff.wide{flex:1;min-width:160px;}
.ff.med{width:120px;}
.ff.narrow{width:88px;}
.ff.xnarrow{width:70px;}
.ff select option{background:var(--surface2);}
.form-actions{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-bottom:1px solid var(--border);}

/* TAG PICKER */
.tag-picker{width:100%;}
.tag-picker-row{display:flex;gap:6px;margin-bottom:6px;align-items:center;}
.tag-picker-search{flex:1;background:rgba(0,0,0,.35);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 8px;outline:none;}
.tag-picker-search:focus{border-color:var(--accent);}
.tag-picker-search::placeholder{color:var(--text-dim);}
.tag-chips{display:flex;flex-wrap:wrap;gap:4px;min-height:28px;padding:2px 0 6px;}
.tag-chip{font-family:var(--mono);font-size:9px;letter-spacing:.04em;padding:3px 9px;border:1px solid var(--border2);background:transparent;color:var(--text-dim);cursor:pointer;border-radius:2px;transition:all .1s;user-select:none;line-height:1.4;}
.tag-chip:hover{border-color:var(--accent);color:var(--text);}
.tag-chip.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.tag-chip.new-tag{border-style:dashed;border-color:var(--border2);color:var(--text-dim);}
.tag-chip.new-tag:hover{border-color:var(--accent);color:var(--accent);}
.tag-direct{width:100%;margin-top:4px;font-size:10px;color:var(--text-dim);}

/* STAGE TABLE */
.stage-tbl{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px;margin-bottom:6px;}
.stage-tbl th{font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);padding:4px 6px;text-align:left;border-bottom:1px solid var(--border);}
.stage-tbl td{padding:2px 3px;border-bottom:1px solid var(--border);}
.stage-tbl input[type=number],.stage-tbl input[type=text]{width:100%;background:transparent;border:1px solid transparent;color:var(--text);padding:3px 5px;font-family:var(--mono);font-size:11px;}
.stage-tbl input:focus{border-color:var(--accent);outline:none;background:rgba(0,0,0,.3);}
.stage-tbl .s15-row{background:rgba(136,198,87,.04);}
.s15-extra td{padding:4px 8px;}
.s15-block{display:flex;gap:8px;flex-wrap:wrap;}

/* RADIO groups */
.rg{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;}
.rg label{display:flex;align-items:center;gap:5px;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text-dim);}
.rg label:hover{color:var(--text);}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--accent);color:#000;padding:7px 16px;font-family:var(--mono);font-size:10px;letter-spacing:.06em;pointer-events:none;opacity:0;transition:opacity .25s;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── LOOKUP MODAL ─────────────────────────────────────────── */
#lu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
#lu-modal{background:var(--surface);border:1px solid var(--border2);width:min(940px,100%);height:min(660px,100%);display:flex;flex-direction:column;overflow:hidden;}
#lu-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2);}
#lu-hdr h2{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);flex:1;margin:0;}
#lu-search-bar{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;}
#lu-url-input{flex:1;background:rgba(0,0,0,.35);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 10px;outline:none;}
#lu-url-input:focus{border-color:var(--accent);}
#lu-body{display:flex;flex:1;min-height:0;overflow:hidden;}
#lu-detail{flex:1;overflow-y:auto;padding:14px;background:var(--bg);}
.lu-badge{font-family:var(--mono);font-size:8px;padding:1px 6px;border-radius:2px;display:inline-block;margin-bottom:3px;}
.lu-badge.wiki{background:rgba(100,160,255,.15);color:#80b0ff;}
.lu-badge.anx{background:rgba(255,160,80,.15);color:#ffaa60;}
.lu-badge.sky{background:rgba(160,255,120,.15);color:#a0e870;}
.lu-dim,.lu-loading,.lu-err{font-family:var(--mono);font-size:10px;color:var(--text-dim);padding:24px;text-align:center;line-height:1.7;}
.lu-err{color:var(--danger);}
.lu-section{margin-bottom:14px;}
.lu-section-title{font-family:var(--mono);font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
/* b14643 multi-design picker */
.lu-b14643-picker{padding:16px 0;}
.lu-b14643-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.lu-b14643-chip{font-family:var(--mono);font-size:10px;padding:7px 16px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;letter-spacing:.06em;transition:all .12s;}
.lu-b14643-chip:hover{background:var(--accent-dim,rgba(100,160,255,.12));border-color:var(--accent);}
/* Stage picker */
.lu-stage-picker{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0 12px;border-bottom:1px solid var(--border);margin-bottom:12px;}
.lu-stage-chip{font-family:var(--mono);font-size:9px;letter-spacing:.06em;padding:4px 11px;border:1px solid var(--border2);background:transparent;color:var(--text-dim);cursor:pointer;border-radius:2px;transition:all .12s;}
.lu-stage-chip:hover{color:var(--text);border-color:var(--accent);}
.lu-stage-chip.active{background:var(--accent-dim,rgba(100,160,255,.15));border-color:var(--accent);color:var(--accent);}
.lu-ftbl{width:100%;border-collapse:collapse;}
.lu-ftbl th{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);padding:4px 8px;text-align:left;border-bottom:1px solid var(--border);}
.lu-ftbl td{padding:5px 8px;border-bottom:1px solid var(--border);font-size:12px;}
.lu-ftbl tr:hover td{background:rgba(255,255,255,.03);}
.lu-fname{color:var(--text-dim);font-family:var(--mono);font-size:10px;}
.lu-fval{color:var(--text-bright);font-family:var(--mono);font-size:11px;}
.lu-fmapped{color:var(--text-dim);font-size:10px;}
#lu-apply-bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--surface2);}
#lu-apply-bar .note{font-family:var(--mono);font-size:9px;color:var(--text-dim);}
.lu-btn{font-family:var(--mono);font-size:10px;padding:5px 13px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text-dim);letter-spacing:.05em;}
.lu-btn.primary{border-color:var(--accent);color:var(--accent);}
.lu-btn:hover.primary{background:var(--accent-dim);}
input[type=checkbox].lu-cb{width:14px;height:14px;accent-color:var(--accent);cursor:pointer;}

/* IN-APP DIALOG */
#pm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:none;align-items:center;justify-content:center;}
#pm-dialog{background:var(--surface2);border:1px solid var(--border2);min-width:300px;max-width:480px;width:100%;}
#pm-dlg-title{padding:11px 16px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--text-bright);}
#pm-dlg-body{padding:16px;}
#pm-dlg-body p{font-size:13px;line-height:1.55;color:var(--text);margin:0 0 12px;}
#pm-dlg-body input,#pm-dlg-body select{width:100%;background:rgba(0,0,0,.35);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:11px;padding:6px 10px;outline:none;margin-top:2px;}
#pm-dlg-body input:focus,#pm-dlg-body select:focus{border-color:var(--accent);}
#pm-dlg-body select option{background:var(--surface2);}
#pm-dlg-body .dlg-field{margin-bottom:12px;}
#pm-dlg-body .dlg-field label{display:block;font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:2px;}
#pm-dlg-body .dlg-field:last-child{margin-bottom:0;}
#pm-dlg-btns{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
</style>
</head>
<body>

<!-- In-app dialog overlay -->
<div id="pm-overlay">
  <div id="pm-dialog">
    <div id="pm-dlg-title">Notice</div>
    <div id="pm-dlg-body"></div>
    <div id="pm-dlg-btns"></div>
  </div>
</div>

<div id="hdr">
  <h1>RP — Preset Manager</h1>
  <label class="btn primary" style="cursor:pointer;">Open lv_calc.html<input type="file" id="file-input" accept=".html" style="display:none;" onchange="doOpen(this)"></label>
  <span id="fname">No file loaded</span>
  <span class="sep"></span>
  <span id="dirty-badge">● Unsaved</span>
  <button class="btn" id="btn-save" disabled onclick="doSave()">Save File</button>
</div>

<div id="tabs">
  <button class="tab active" id="tab-stages-btn" onclick="switchTab('stages')">Stage Library</button>
  <button class="tab" id="tab-vehicles-btn" onclick="switchTab('vehicles')">Vehicle Presets</button>
</div>

<div id="body">
  <!-- STAGES -->
  <div class="panel" id="pane-stages">
    <div class="left-pane">
      <div class="list-toolbar">
        <div class="list-toolbar-row">
          <button class="btn sm" onclick="promptAddCategory()">+ Category</button>
          <button class="btn sm" onclick="addStageQuick()">+ Stage</button>
        </div>
        <input class="list-search" id="stage-search" type="search" placeholder="Filter stages…" autocomplete="off"
          oninput="_stageFilter=this.value.trim().toLowerCase();renderStagesList()">
      </div>
      <div class="list-scroll" id="stages-list"></div>
    </div>
    <div class="right-pane" id="stage-editor"><div class="no-file">Open <b>lv_calc.html</b> to begin</div></div>
  </div>

  <!-- VEHICLES -->
  <div class="panel" id="pane-vehicles" style="display:none">
    <div class="left-pane">
      <div class="list-toolbar">
        <button class="btn sm" onclick="addVehicle()">+ Vehicle</button>
      </div>
      <div class="list-scroll" id="vehicles-list"></div>
    </div>
    <div class="right-pane" id="vehicle-editor"><div class="no-file">Open <b>lv_calc.html</b> to begin</div></div>
  </div>
</div>

<div id="toast"></div>

<!-- ── LOOKUP MODAL ─────────────────────────────────────────────── -->
<div id="lu-overlay">
  <div id="lu-modal">
    <div id="lu-hdr">
      <h2>Web Data Lookup</h2>
      <span id="lu-mode-badge" class="lu-badge wiki" style="font-size:9px;"></span>
      <button class="lu-btn" onclick="closeLookup()" style="margin-left:auto;">✕ Close</button>
    </div>
    <div id="lu-search-bar">
      <input id="lu-url-input" type="url" placeholder="Paste a Wikipedia, Astronautix, or Skyrocket URL and press Fetch →"
        onkeydown="if(event.key==='Enter')luFetch()">
      <button class="btn sm primary" onclick="luFetch()">Fetch</button>
    </div>
    <div id="lu-body">
      <div id="lu-detail" style="flex:1;overflow-y:auto;padding:14px;"><div class="lu-dim">Paste a page URL above and click Fetch</div></div>
    </div>
    <div id="lu-apply-bar">
      <span class="note" id="lu-apply-note">No data loaded</span>
      <div style="display:flex;gap:8px;">
        <button class="lu-btn" onclick="luSelectAll(true)">Select All</button>
        <button class="lu-btn" onclick="luSelectAll(false)">None</button>
        <button class="lu-btn primary" onclick="luApply()">Apply Selected to Form</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════════
//  IN-APP DIALOG SYSTEM  (replaces alert / confirm / prompt)
// ══════════════════════════════════════════════════════════
/**
 * Show an in-app dialog.
 *   title   – header text
 *   bodyHTML – arbitrary HTML injected into the body div
 *   buttons  – [{label, primary, danger, action}]
 *              action() is called after the dialog closes
 */
function _pmDlg({ title, bodyHTML, buttons }) {
  document.getElementById('pm-dlg-title').textContent = title || 'Notice';
  const body = document.getElementById('pm-dlg-body');
  body.innerHTML = bodyHTML || '';

  const btns = document.getElementById('pm-dlg-btns');
  btns.innerHTML = '';
  (buttons || [{ label: 'OK', primary: true }]).forEach(b => {
    const el = document.createElement('button');
    el.className = 'btn' + (b.primary ? ' primary' : '') + (b.danger ? ' danger' : '');
    el.textContent = b.label;
    el.onclick = () => { _pmClose(); b.action && b.action(); };
    btns.appendChild(el);
  });

  document.getElementById('pm-overlay').style.display = 'flex';

  // Auto-focus first interactive element
  setTimeout(() => {
    const first = body.querySelector('input,select,textarea');
    if (first) { first.focus(); if (first.select) first.select(); }
  }, 50);

  // Enter in any single-line input → primary button; Escape → cancel
  body.onkeydown = e => {
    if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
      const ok = buttons?.find(b => b.primary);
      if (ok) { _pmClose(); ok.action && ok.action(); }
    }
    if (e.key === 'Escape') _pmClose();
  };
}

function _pmClose() { document.getElementById('pm-overlay').style.display = 'none'; }

// Single message, one OK button
function pmAlert(msg, title) {
  _pmDlg({ title: title || 'Notice',
    bodyHTML: `<p>${esc(msg)}</p>`,
    buttons: [{ label: 'OK', primary: true }] });
}

// Yes/No confirmation
function pmConfirm(title, msg, onOk, okLabel) {
  _pmDlg({ title,
    bodyHTML: `<p>${esc(msg)}</p>`,
    buttons: [
      { label: 'Cancel' },
      { label: okLabel || 'Confirm', danger: okLabel === 'Delete', primary: true, action: onOk },
    ]});
}

// Single text-field prompt
function pmPrompt(title, msg, def, onOk, placeholder) {
  const id = 'pm-prompt-inp';
  _pmDlg({ title,
    bodyHTML: `${msg ? `<p>${esc(msg)}</p>` : ''}
      <div class="dlg-field">
        <input id="${id}" type="text" value="${esc(def||'')}" placeholder="${esc(placeholder||'')}">
      </div>`,
    buttons: [
      { label: 'Cancel' },
      { label: 'OK', primary: true,
        action: () => { const v = document.getElementById(id)?.value.trim(); if (onOk) onOk(v); } },
    ]
  });
}

// Close on bare overlay click
document.addEventListener('click', e => { if (e.target.id === 'pm-overlay') _pmClose(); });

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
let _filename = 'lv_calc.html'; // last opened filename
let src      = '';              // raw file text
let stageLib = {};              // STAGE_LIBRARY  {cat:[{...}]}
let presets  = [];              // BUILTIN_PRESETS [{...}]
let _dirty   = false;
let selStage   = null;          // {cat,idx}
let selVehicle = null;          // number

// ══════════════════════════════════════════════════════════
//  FILE OPS
// ══════════════════════════════════════════════════════════
function doOpen(input) {
  const file = input.files[0];
  if (!file) return;
  _filename = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    src = e.target.result;
    parseAll();
    renderStagesList();
    renderVehiclesList();
    document.getElementById('fname').textContent = file.name;
    document.getElementById('btn-save').disabled = false;
    document.getElementById('stage-editor').innerHTML  = '<div class="placeholder">Select a stage to edit</div>';
    document.getElementById('vehicle-editor').innerHTML = '<div class="placeholder">Select a vehicle to edit</div>';
    setDirty(false);
    showToast('Loaded ' + Object.keys(stageLib).length + ' categories, ' + presets.length + ' vehicles');
    // Reset input so the same file can be re-opened if needed
    input.value = '';
  };
  reader.readAsText(file);
}

function doSave() {
  if (!src) return;
  const newSrc = buildNewSource();
  src = newSrc;
  const blob = new Blob([newSrc], {type: 'text/html'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = _filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
  setDirty(false);
  showToast('Saved — replace the original file with the download ✓');
}

function setDirty(d) {
  _dirty = d;
  document.getElementById('dirty-badge').style.display = d ? 'inline' : 'none';
  const btn = document.getElementById('btn-save');
  if (btn) btn.classList.toggle('primary', d);
}

// ══════════════════════════════════════════════════════════
//  PARSING
// ══════════════════════════════════════════════════════════
/**
 * Find "const <varName>" in source, then extract the balanced bracket region.
 * Returns {start, sectionStart, end, code} or null.
 */
function extractSection(source, varName, openBr, closeBr) {
  const marker = 'const ' + varName;
  const start = source.indexOf(marker);
  if (start < 0) return null;
  let i = source.indexOf(openBr, start);
  if (i < 0) return null;
  const sectionStart = i;
  let depth = 0, inLC = false, inBC = false, inStr = false, strCh = '';
  for (; i < source.length; i++) {
    const c = source[i];
    if (inLC)  { if (c === '\n') inLC = false; continue; }
    if (inBC)  { if (c === '*' && source[i+1] === '/') { inBC = false; i++; } continue; }
    if (inStr) { if (c === '\\') { i++; continue; } if (c === strCh) inStr = false; continue; }
    if (c === '/' && source[i+1] === '/') { inLC = true; continue; }
    if (c === '/' && source[i+1] === '*') { inBC = true; i++; continue; }
    if (c === '"' || c === "'" || c === '`') { inStr = true; strCh = c; continue; }
    if (c === openBr) depth++;
    else if (c === closeBr) { depth--; if (depth === 0) return { start, sectionStart, end: i, code: source.slice(sectionStart, i + 1) }; }
  }
  return null;
}

function parseAll() {
  const sl = extractSection(src, 'STAGE_LIBRARY', '{', '}');
  if (sl) { try { stageLib = (0, eval)('(' + sl.code + ')'); } catch(e) { pmAlert('Parse STAGE_LIBRARY failed:\n' + e.message, 'Parse Error'); stageLib = {}; } }
  const bp = extractSection(src, 'BUILTIN_PRESETS', '[', ']');
  if (bp) { try { presets = (0, eval)('(' + bp.code + ')'); } catch(e) { pmAlert('Parse BUILTIN_PRESETS failed:\n' + e.message, 'Parse Error'); presets = []; } }
}

// ══════════════════════════════════════════════════════════
//  SERIALIZATION
// ══════════════════════════════════════════════════════════
function jsStr(s) {
  return "'" + String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r?\n/g,'\\n') + "'";
}

function jsVal(v, depth) {
  depth = depth || 0;
  if (v === null || v === undefined) return 'null';
  if (typeof v === 'boolean') return String(v);
  if (typeof v === 'number')  return String(v);
  if (typeof v === 'string')  return jsStr(v);
  const pad  = '  '.repeat(depth);
  const inner = '  '.repeat(depth + 1);
  if (Array.isArray(v)) {
    if (v.length === 0) return '[]';
    if (v.every(x => x === null || typeof x !== 'object')) {
      const inline = '[' + v.map(x => jsVal(x, 0)).join(',') + ']';
      if (inline.length <= 72) return inline;
    }
    return '[\n' + v.map(x => inner + jsVal(x, depth + 1)).join(',\n') + '\n' + pad + ']';
  }
  if (typeof v === 'object') {
    const entries = Object.entries(v).filter(([, val]) => val !== undefined);
    if (entries.length === 0) return '{}';
    if (entries.every(([, val]) => val === null || typeof val !== 'object')) {
      const inline = '{' + entries.map(([k,val]) => k + ':' + jsVal(val, 0)).join(',') + '}';
      if (inline.length <= 72) return inline;
    }
    return '{\n' + entries.map(([k, val]) => {
      const key = /^[a-zA-Z_$][a-zA-Z0-9_$]*$/.test(k) ? k : jsStr(k);
      return inner + key + ':' + jsVal(val, depth + 1);
    }).join(',\n') + '\n' + pad + '}';
  }
  return String(v);
}

function serializeStageLib(lib) {
  const parts = Object.entries(lib).map(([cat, stages]) =>
    '  ' + jsStr(cat) + ':[\n' +
    stages.map(s => '    ' + jsVal(s, 2)).join(',\n') +
    '\n  ]'
  );
  return 'const STAGE_LIBRARY={\n' + parts.join(',\n') + '\n}';
}

function serializePresets(ps) {
  return 'const BUILTIN_PRESETS=[\n' +
    ps.map(p => '  ' + jsVal(p, 1)).join(',\n') +
  '\n]';
}

function replaceSection(source, varName, openBr, closeBr, newContent) {
  const sec = extractSection(source, varName, openBr, closeBr);
  if (!sec) return source;
  let end = sec.end + 1;
  // skip trailing semicolons
  while (end < source.length && source[end] === ';') end++;
  return source.slice(0, sec.start) + newContent + ';' + source.slice(end);
}

function buildNewSource() {
  let out = src;
  out = replaceSection(out, 'BUILTIN_PRESETS', '[', ']', serializePresets(presets));
  out = replaceSection(out, 'STAGE_LIBRARY',   '{', '}', serializeStageLib(stageLib));
  return out;
}

let _stageFilter = '';

function addStageQuick() {
  const cat = selStage?.cat || Object.keys(stageLib)[0];
  if (!cat) { pmAlert('Add a category first.', 'No Categories'); return; }
  addStageToCategory(cat);
}

function renderStagesList() {
  const el = document.getElementById('stages-list');
  if (!el) return;
  const q = _stageFilter;
  let html = '';
  for (const [cat, stages] of Object.entries(stageLib)) {
    const catE = esc(cat);
    // Filter: include category if it matches or any of its stages match
    const matchedStages = q
      ? stages.map((s, i) => ({ s, i })).filter(({ s }) =>
          s.name?.toLowerCase().includes(q) ||
          cat.toLowerCase().includes(q) ||
          (s.tags||[]).some(t => t.toLowerCase().includes(q)))
      : stages.map((s, i) => ({ s, i }));
    if (q && matchedStages.length === 0) continue; // hide empty categories when filtering
    html += `<div class="cat-row">
      <span class="cat-label">${catE}</span>
      <span class="cat-actions">
        <button class="icon-btn" onclick="addStageToCategory('${catE}')" title="Add stage">+</button>
        <button class="icon-btn" onclick="renameCategory('${catE}')" title="Rename">✎</button>
        <button class="icon-btn d" onclick="deleteCategory('${catE}')" title="Delete">✕</button>
      </span>
    </div>`;
    matchedStages.forEach(({ s, i: idx }) => {
      const isSel = selStage && selStage.cat === cat && selStage.idx === idx;
      html += `<div class="li${isSel?' sel':''}" onclick="selectStage('${catE}',${idx})">
        <span class="li-name">${esc(s.name||'Unnamed')}</span>
        <span class="li-del" onclick="event.stopPropagation();deleteStage('${catE}',${idx})">✕</span>
      </div>`;
    });
  }
  el.innerHTML = html;
}

function selectStage(cat, idx) {
  selStage = {cat, idx};
  renderStagesList();
  renderStageEditor(stageLib[cat]?.[idx], cat, idx);
}

function saveStageEdits(oldCat, idx) {
  const newCat = document.getElementById('se-cat').value;
  const stage = {
    name:    document.getElementById('se-name').value.trim(),
    dry:     numF('se-dry'),
    prop:    numF('se-prop'),
    thrust:  numF('se-thrust'),
    isp:     numF('se-isp'),
    res:     numF('se-res'),
    engines: document.getElementById('se-engines').value.trim() || undefined,
    note:    document.getElementById('se-note').value.trim()    || undefined,
    tags:    document.getElementById('se-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
  };
  // Stage-and-a-half fields
  if (document.getElementById('se-s15')?.checked) {
    stage.s15             = true;
    stage.s15_sust_thrust = numF('se-s15t');
    stage.s15_sust_isp    = numF('se-s15i');
    stage.s15_jet_mass    = numF('se-s15j');
    stage.s15_beco_twr    = numF('se-s15w');
  }
  purgeUndefined(stage);

  if (newCat !== oldCat) {
    stageLib[oldCat].splice(idx, 1);
    if (!stageLib[oldCat].length) delete stageLib[oldCat];
    if (!stageLib[newCat]) stageLib[newCat] = [];
    stageLib[newCat].push(stage);
    selStage = {cat: newCat, idx: stageLib[newCat].length - 1};
  } else {
    stageLib[oldCat][idx] = stage;
    selStage = {cat: oldCat, idx};
  }
  setDirty(true);
  renderStagesList();
  renderStageEditor(stage, selStage.cat, selStage.idx);
  showToast('Stage saved');
}

function deleteStage(cat, idx) {
  pmConfirm('Delete Stage', 'Delete "' + (stageLib[cat]?.[idx]?.name||'this stage') + '"?', () => {
    stageLib[cat].splice(idx, 1);
    if (!stageLib[cat].length) delete stageLib[cat];
    if (selStage?.cat === cat && selStage?.idx === idx) selStage = null;
    setDirty(true);
    renderStagesList();
    document.getElementById('stage-editor').innerHTML = '<div class="placeholder">Select a stage to edit</div>';
  }, 'Delete');
}

// Create a blank stage in the given category and open it for editing immediately.
function addStageToCategory(cat) {
  if (!stageLib[cat]) stageLib[cat] = [];
  stageLib[cat].push({name:'New Stage', dry:0, prop:0, thrust:0, isp:300, res:2, tags:[]});
  const idx = stageLib[cat].length - 1;
  setDirty(true);
  renderStagesList();
  selectStage(cat, idx);
}

function renameCategory(oldName) {
  pmPrompt('Rename Category', 'New name:', oldName, newName => {
    if (!newName || newName === oldName) return;
    if (stageLib[newName]) { pmAlert('Category already exists.', 'Name Taken'); return; }
    const rebuilt = {};
    for (const [k,v] of Object.entries(stageLib)) rebuilt[k===oldName ? newName : k] = v;
    stageLib = rebuilt;
    if (selStage?.cat === oldName) selStage.cat = newName;
    setDirty(true);
    renderStagesList();
    if (selStage) renderStageEditor(stageLib[selStage.cat]?.[selStage.idx], selStage.cat, selStage.idx);
  });
}

function deleteCategory(cat) {
  pmConfirm('Delete Category', 'Delete "' + cat + '" and ALL its stages?', () => {
    delete stageLib[cat];
    if (selStage?.cat === cat) selStage = null;
    setDirty(true);
    renderStagesList();
    document.getElementById('stage-editor').innerHTML = '<div class="placeholder">Select a stage to edit</div>';
  }, 'Delete');
}

/* ─── collect stage data ─── */
function collectStageData() {
  const rows = [...document.querySelectorAll('#ve-sd-tbody .stage-tbl-row')];
  return rows.map(row => {
    const s15cb = row.querySelector('.ve-sd-s15');
    const obj = {
      dry:    numR(row, '.ve-sd-dry'),
      prop:   numR(row, '.ve-sd-prop'),
      thrust: numR(row, '.ve-sd-thrust'),
      isp:    numR(row, '.ve-sd-isp'),
      res:    numR(row, '.ve-sd-res'),
    };
    if (s15cb?.checked) {
      const next = row.nextElementSibling;
      obj.s15 = true;
      obj.s15_sust_thrust = numR(next, '.ve-sd-s15t');
      obj.s15_sust_isp    = numR(next, '.ve-sd-s15i');
      obj.s15_jet_mass    = numR(next, '.ve-sd-s15j');
      obj.s15_beco_twr    = numR(next, '.ve-sd-s15w');
    }
    return obj;
  });
}

/* ─── save vehicle ─── */
function saveVehicleEdits(idx) {
  const stageType = document.querySelector('input[name="ve-stype"]:checked')?.value || 'names';
  const bstType   = document.querySelector('input[name="ve-btype"]:checked')?.value || 'none';
  const mode      = document.querySelector('input[name="ve-mode"]:checked')?.value  || 'orbit';

  const p = {};
  p.name  = document.getElementById('ve-name').value.trim();
  p.tags  = document.getElementById('ve-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  const note = document.getElementById('ve-note').value.trim();
  if (note) p.note = note;

  p.payload      = numF('ve-payload');
  p.fairingMass  = numF('ve-fairing-mass');
  p.fairingJettison = parseInt(document.getElementById('ve-fj').value) || 0;

  if (stageType === 'data') {
    p.stageData = collectStageData();
    p.stages = p.stageData.length;
  } else {
    p.stageNames = [...document.querySelectorAll('.ve-sname')].map(i => i.value.trim());
    p.stages = p.stageNames.length;
  }

  if (bstType === 'lib') {
    p.boosterName  = document.getElementById('ve-bst-name').value.trim();
    p.boosterCount = parseInt(document.getElementById('ve-bst-count').value) || 0;
  } else if (bstType === 'inline') {
    p.boosterData = {
      count:  parseInt(document.getElementById('ve-bsti-count').value) || 2,
      dry:    numF('ve-bsti-dry'),
      prop:   numF('ve-bsti-prop'),
      thrust: numF('ve-bsti-thr'),
      isp:    numF('ve-bsti-isp'),
    };
  } else {
    p.boosterName  = null;
    p.boosterCount = 0;
  }

  p.site = {
    lat:   parseFloat(document.getElementById('ve-lat').value)   || 0,
    azMin: parseFloat(document.getElementById('ve-azmin').value) || 0,
    azMax: parseFloat(document.getElementById('ve-azmax').value) || 0,
  };
  p.mode = mode;
  if (mode === 'orbit') {
    p.orbit = {
      perigee: numF('ve-perigee'),
      apogee:  numF('ve-apogee'),
      inc:     parseFloat(document.getElementById('ve-inc').value) || 0,
    };
  } else {
    p.escape = {
      c3:      parseFloat(document.getElementById('ve-c3').value)       || 0,
      decl:    parseFloat(document.getElementById('ve-decl').value)     || 0,
      perigee: parseFloat(document.getElementById('ve-esc-park').value) || 185,
    };
  }

  presets[idx] = p;
  selVehicle = idx;
  setDirty(true);
  renderVehiclesList();
  renderVehicleEditor(p, idx);
  showToast('Vehicle saved');
}

function deleteVehicle(idx) {
  pmConfirm('Delete Vehicle', 'Delete "' + (presets[idx]?.name||'this vehicle') + '"?', () => {
    presets.splice(idx, 1);
    selVehicle = null;
    setDirty(true);
    renderVehiclesList();
    document.getElementById('vehicle-editor').innerHTML = '<div class="placeholder">Select a vehicle to edit</div>';
  }, 'Delete');
}

function addVehicle() {
  presets.push({
    name: 'New Vehicle', payload: 100, fairingMass: 0, fairingJettison: 0,
    stageNames: [], stages: 1,
    boosterName: null, boosterCount: 0,
    site: {lat:28.5, azMin:37, azMax:120},
    mode: 'orbit', orbit: {perigee:185, apogee:185, inc:28.5},
    tags: [],
  });
  setDirty(true);
  renderVehiclesList();
  selectVehicle(presets.length - 1);
}

// User-added tags persist across sessions
let _userTagDb = JSON.parse(localStorage.getItem('pm_user_tags') || '[]');

function _seAllTags() {
  // Merge default + user tags, deduplicate, sort alphabetically
  return [...new Set([..._TAG_DB_DEFAULT, ..._userTagDb])].sort((a, b) => a.localeCompare(b));
}

function _seGetCurrentTags() {
  const inp = document.getElementById('se-tags');
  if (!inp) return [];
  return inp.value.split(',').map(t => t.trim()).filter(Boolean);
}

function _seSetCurrentTags(arr) {
  const inp = document.getElementById('se-tags');
  if (inp) inp.value = arr.join(', ');
}

function _seToggleTag(tag) {
  const cur = _seGetCurrentTags();
  const idx = cur.findIndex(t => t.toLowerCase() === tag.toLowerCase());
  if (idx >= 0) cur.splice(idx, 1); else cur.push(tag);
  _seSetCurrentTags(cur);
  _seRenderTagChips();
}

function _seFilterTags() { _seRenderTagChips(); }

function _seAddTagFromSearch() {
  const inp = document.getElementById('se-tag-search');
  const val = inp ? inp.value.trim() : '';
  if (!val) return;
  // Add to user DB if not already present
  if (!_seAllTags().some(t => t.toLowerCase() === val.toLowerCase())) {
    _userTagDb.push(val);
    localStorage.setItem('pm_user_tags', JSON.stringify(_userTagDb));
  }
  // Also toggle it on immediately
  const cur = _seGetCurrentTags();
  if (!cur.some(t => t.toLowerCase() === val.toLowerCase())) {
    cur.push(val);
    _seSetCurrentTags(cur);
  }
  if (inp) inp.value = '';
  _seRenderTagChips();
}

function _seRenderTagChips() {
  const wrap = document.getElementById('se-tag-chips');
  if (!wrap) return;

  const searchInp = document.getElementById('se-tag-search');
  const q = (searchInp?.value || '').trim().toLowerCase();
  const current = _seGetCurrentTags().map(t => t.toLowerCase());
  const all = _seAllTags();

  let visible = q ? all.filter(t => t.toLowerCase().includes(q)) : all;

  // Always show currently-selected tags first (even if they don't match the filter)
  const selectedTags = _seGetCurrentTags().filter(t =>
    !visible.some(v => v.toLowerCase() === t.toLowerCase())
  );

  const chips = [...selectedTags, ...visible].map(tag => {
    const on = current.includes(tag.toLowerCase());
    const tagE = tag.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    return `<button class="tag-chip${on?' on':''}" onclick="_seToggleTag('${tagE}')">${esc(tag)}</button>`;
  }).join('');

  // Show "+ Add" chip when search text doesn't match any existing tag exactly
  const exactMatch = all.some(t => t.toLowerCase() === q);
  const addChip = q && !exactMatch
    ? `<button class="tag-chip new-tag" onclick="_seAddTagFromSearch()" title="Add '${q.replace(/'/g,'')}' as new tag">+ "${esc(q)}"</button>`
    : '';

  wrap.innerHTML = chips + addChip;
}

// CORS proxy list — tried in order, first success wins
const LU_PROXIES = [
  url => 'https://corsproxy.io/?' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
];
let _luMode = 'stage';        // 'stage' | 'vehicle'
let _luExtracted = {};        // full parsed result (may contain ._stages, ._vehicleFields)
let _luActiveFields = {};     // the fields currently shown / applied (selected stage or vehicle)
let _luCurrentURL = '';       // last fetched URL (for "Open source" link)
let _luSelectedStage = -1;    // -1 = vehicle-level, 0+ = stage index

// ── Open / Close ──────────────────────────────────────────────────
function openLookup(mode) {
  _luMode = mode;
  document.getElementById('lu-mode-badge').textContent = mode === 'stage' ? 'Stage' : 'Vehicle';
  document.getElementById('lu-detail').innerHTML = '<div class="lu-dim">Paste a page URL above and click Fetch</div>';
  document.getElementById('lu-apply-note').textContent = 'No data loaded';
  _luExtracted = {}; _luCurrentURL = '';
  document.getElementById('lu-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('lu-url-input').focus(), 60);
}
function closeLookup() {
  document.getElementById('lu-overlay').style.display = 'none';
}
document.getElementById('lu-overlay').addEventListener('click', e => { if (e.target.id === 'lu-overlay') closeLookup(); });

// ── Fetch (URL-based entry point) ─────────────────────────────────
async function luFetch() {
  const rawURL = document.getElementById('lu-url-input').value.trim();
  if (!rawURL) return;
  _luCurrentURL = rawURL;
  document.getElementById('lu-detail').innerHTML = '<div class="lu-loading">Fetching…</div>';
  document.getElementById('lu-apply-note').textContent = 'Loading…';

  try {
    let extracted = {};
    // Wikipedia: any en.wikipedia.org URL
    const wikiM = rawURL.match(/en\.wikipedia\.org\/wiki\/(.+)/);
    if (wikiM) {
      const title = decodeURIComponent(wikiM[1].split('#')[0]);
      extracted = await _luFetchWiki(title);
    } else if (/b14643\.eu/i.test(rawURL)) {
      extracted = await _luFetchB14643(rawURL);
    } else if (/astronautix\.com/i.test(rawURL)) {
      extracted = await _luFetchProxy(rawURL, _luParseAnx);
    } else if (/skyrocket\.de/i.test(rawURL)) {
      extracted = await _luFetchProxy(rawURL, _luParseSky);
    } else {
      // Generic: try proxy + heuristic parse
      extracted = await _luFetchProxy(rawURL, _luParseGeneric);
    }
    // b14643 multiple-design-page picker
    if (extracted._b14643Picker) {
      _luRenderB14643Picker(extracted._links);
      return;
    }
    _luExtracted = extracted;
    // Default active fields: first stage in stage mode, vehicle-level otherwise
    if (_luExtracted._stages?.length) {
      _luSelectedStage = _luMode === 'stage' ? 0 : -1;
    } else {
      _luSelectedStage = -1;
    }
    _luActiveFields = _luGetFields(_luSelectedStage);
    _luRenderDetail(rawURL);
  } catch(e) {
    document.getElementById('lu-detail').innerHTML =
      `<div class="lu-err">Failed to load: ${esc(e.message)}<br><br>
       <a href="${esc(rawURL)}" target="_blank" style="color:var(--accent);">Open in browser ↗</a></div>`;
    document.getElementById('lu-apply-note').textContent = 'Error';
  }
}

// ── Wikipedia fetch ───────────────────────────────────────────────
async function _luFetchWiki(title) {
  const url = `https://en.wikipedia.org/w/api.php?action=parse&page=${encodeURIComponent(title)}&prop=text&format=json&origin=*`;
  const d = await (await fetch(url)).json();
  if (d.error) throw new Error(d.error.info);
  const html = d.parse?.text?.['*'] || '';
  return _luParseWikiHTML(html);
}

// Regex that identifies infobox section headers that represent a rocket stage.
// Uses 's?' so plurals ("Boosters", "Stages") are caught too.
const _LU_STAGE_HDR = /\b(first|second|third|fourth|fifth|1st|2nd|3rd|4th|5th|upper|lower|core|sustainer|strap[\s\-]?ons?|solid[\s\-]?rockets?|srbs?|boosters?|stages?)\b/i;

function _luParseWikiHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const vehicleFields = {};
  const stages = [];        // [{name, fields}]
  let current = vehicleFields;

  const infobox = doc.querySelector('table.infobox');
  const rows = infobox
    ? [...infobox.querySelectorAll('tr')]
    : [...doc.querySelectorAll('table tr')];

  rows.forEach(row => {
    const tds  = [...row.querySelectorAll('td')];
    const ths  = [...row.querySelectorAll('th')];

    // A row is a section header if:
    //  (a) it has no <td> at all, OR
    //  (b) one of its <th>s has colspan >= 2 (spanning both columns), OR
    //  (c) one of its <th>s carries class "infobox-header"
    // This handles both the pure-<th> rows and the colspan-inside-mixed-row cases.
    const spanningTh = ths.find(th =>
      parseInt(th.getAttribute('colspan') || '1') >= 2 ||
      th.classList.contains('infobox-header')
    );
    const isHeaderRow = (tds.length === 0 && ths.length >= 1) || spanningTh != null;

    if (isHeaderRow && ths.length >= 1) {
      const htext = (spanningTh || ths[0]).textContent.trim().replace(/\[.*?\]/g, '');
      if (_LU_STAGE_HDR.test(htext)) {
        const sFields = {};
        stages.push({ name: htext, fields: sFields });
        current = sFields;
        return;
      }
      // Non-stage header → reset to vehicle level only before any stages found
      if (stages.length === 0) current = vehicleFields;
      return;
    }
    _luMapWikiRow(row, current);
  });

  // Derive propellant mass from gross - dry for all buckets
  _luDeriveProps(vehicleFields);
  stages.forEach(s => _luDeriveProps(s.fields));

  // Scan paragraphs into vehicle bucket (general info)
  doc.querySelectorAll('p').forEach(p => _luScanText(p.textContent, vehicleFields, 'wiki'));

  // Build output object
  const out = { ...vehicleFields };
  if (stages.length > 0) {
    out._stages = stages;
    out._vehicleFields = vehicleFields;
  }
  return out;
}

function _luMapWikiRow(row, out) {
  const cells = row.querySelectorAll('th,td');
  if (cells.length < 2) return;
  const key = cells[0].textContent.trim().toLowerCase().replace(/\s+/g,' ').replace(/\[.*?\]/g,'');
  const val = cells[cells.length-1].textContent.trim().replace(/\[\d+\]/g,'');
  _luMapField(key, val, out, 'wiki');
}

// ── Proxy fetch (Astronautix, Skyrocket, generic) ─────────────────
async function _luFetchProxy(url, parser) {
  let lastErr;
  for (const proxyFn of LU_PROXIES) {
    try {
      const resp = await fetch(proxyFn(url));
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const html = await resp.text();
      if (html.length < 200) throw new Error('Page too short — may be blocked');
      return parser(html, url);
    } catch(e) { lastErr = e; }
  }
  throw lastErr || new Error('All proxies failed');
}

// ── b14643.eu fetch + parser ──────────────────────────────────────
// The site is mirrored on GitHub: fjmoeller/b14643 (main branch, /b14643/ subfolder).
// That lets us fetch directly from raw.githubusercontent.com — no CORS proxy needed.
// Frame.htm pages are framesets; actual data is always in the sibling Text.htm.
//
// Table format (3 columns):
//   col 0 (20%): row label, e.g. "Liftoff weight"
//   col 1  (5%): unit,      e.g. "t", "kN", "N*s/kg"
//   col 2 (14%, sometimes colspan=2): numeric value
// Stage sections are separated by gray rows (bgcolor="#C0C0C0"):
//   col 0: stage number  ("Stage 1")
//   col 1: "Name" label
//   col 2+: engine/stage designation string

// Convert any b14643.eu URL to its raw.githubusercontent.com equivalent.
function _b14643GhURL(url) {
  return url.replace(/^https?:\/\/b14643\.eu\//i,
    'https://raw.githubusercontent.com/fjmoeller/b14643/main/b14643/');
}

// Fetch a raw URL and return text; throws on HTTP error or tiny response.
async function _b14643Fetch(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + url);
  const t = await r.text();
  if (t.length < 100) throw new Error('Page too short: ' + url);
  return t;
}

async function _luFetchB14643(url) {
  const gh = _b14643GhURL(url);

  // ── Strategy 1: URL is already a specific Design page (not a frameset) ──
  if (/\/Design\//i.test(gh) && !/Frame\.htm/i.test(gh)) {
    const html = await _b14643Fetch(gh);
    const result = _luParseB14643(html);
    if (_b14643HasData(result)) return result;
  }

  // ── Strategy 2: Find design page(s) via Nav.htm ──────────────────
  const dir = gh.replace(/[^/]+$/, '');
  const navURL = dir + 'Nav.htm';
  let designLinks = [];
  try {
    const navHtml = await _b14643Fetch(navURL);
    const navDoc  = new DOMParser().parseFromString(navHtml, 'text/html');
    designLinks = [...navDoc.querySelectorAll('a[href]')]
      .filter(a => {
        const href = a.getAttribute('href') || '';
        return /vehicle\s*design/i.test(a.textContent) ||
               /[/\\]Design[/\\]/i.test(href) ||
               /^\.\.\/Design\//i.test(href);
      })
      .map(a => ({
        label: a.textContent.trim().replace(/\s+/g, ' ') || 'Design',
        url:   new URL(a.getAttribute('href'), navURL).href,
      }));
  } catch(_) { /* Nav.htm absent */ }

  // Multiple design pages → show a picker; caller handles rendering
  if (designLinks.length > 1) {
    // Check if one is labelled "Vehicle Design" — auto-select it if so
    const auto = designLinks.find(d => /vehicle\s*design/i.test(d.label));
    if (!auto) {
      // Genuine ambiguity: surface picker to user
      return { _b14643Picker: true, _links: designLinks, _navURL: navURL };
    }
    // Single unambiguous "Vehicle Design" link even among multiples
    designLinks = [auto];
  }

  if (designLinks.length === 1) {
    const html = await _b14643Fetch(designLinks[0].url);
    const result = _luParseB14643(html);
    if (_b14643HasData(result)) return result;
  }

  // ── Strategy 3: last resort — parse the given URL directly ───────
  const html = await _b14643Fetch(gh.replace(/Frame\.htm([?#].*)?$/i, 'Text.htm'));
  return _luParseB14643(html);
}

// Called when user clicks a design-page chip in the picker UI
async function _b14643PickDesign(ghURL) {
  document.getElementById('lu-detail').innerHTML = '<div class="lu-loading">Fetching…</div>';
  document.getElementById('lu-apply-note').textContent = 'Loading…';
  try {
    const html   = await _b14643Fetch(ghURL);
    const result = _luParseB14643(html);
    _luExtracted = result;
    _luSelectedStage = result._stages?.length ? (_luMode === 'stage' ? 0 : -1) : -1;
    _luActiveFields  = _luGetFields(_luSelectedStage);
    _luRenderDetail(ghURL);
  } catch(e) {
    document.getElementById('lu-detail').innerHTML =
      `<div class="lu-err">Failed: ${esc(e.message)}</div>`;
    document.getElementById('lu-apply-note').textContent = 'Error';
  }
}

// Returns true if the parsed result has at least one stage or one non-private field.
function _b14643HasData(r) {
  if (r._stages?.length) return true;
  return Object.keys(r).some(k => !k.startsWith('_'));
}

// Render a picker when multiple b14643 design pages are available.
function _luRenderB14643Picker(links) {
  document.getElementById('lu-apply-note').textContent = 'Choose a design page';
  const chips = links.map(d => {
    const safeURL = d.url.replace(/'/g, "\\'");
    return `<button class="lu-b14643-chip" onclick="_b14643PickDesign('${safeURL}')">${esc(d.label)}</button>`;
  }).join('');
  document.getElementById('lu-detail').innerHTML =
    `<div class="lu-b14643-picker">
       <div class="lu-section-title">Multiple design pages found — choose one:</div>
       <div class="lu-b14643-chips">${chips}</div>
     </div>`;
}

function _luParseB14643(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const vehicleFields = {};
  const stages = [];   // [{name, fields}]
  // currentGroup: array of {fields} objects active for the current section.
  // Single-entry  → vehicle-level or single-variant stage (use cells.last).
  // Multi-entry   → positional mapping, one entry per named variant column.
  let currentGroup = [{ fields: vehicleFields }];

  const stageHdrRE = /^(?:stage\s+\d+|booster|core\s+stage|strap[\s\-]?on|solid\s+rocket)/i;
  const isGrayCell = c => /^#?c0c0c0$/i.test(c.getAttribute('bgcolor') || '');
  // Trim including non-breaking spaces ( ) which String.trim() doesn't remove
  const nbTrim = s => s.replace(/^[\s ]+|[\s ]+$/g, '');

  doc.querySelectorAll('tr').forEach(row => {
    const cells = [...row.querySelectorAll('td,th')];
    if (!cells.length) return;

    // ── Stage header row ──────────────────────────────────────────────────────
    if (isGrayCell(cells[0])) {
      const stageLabel = nbTrim(cells[0].textContent).replace(/\s+/g, ' ');
      if (!stageHdrRE.test(stageLabel)) return;

      // col0 = "Stage N", col1 = "Name" label, col2+ = variant name strings
      const nameCells = cells.slice(2)
        .map(c => nbTrim(c.textContent).replace(/\s+/g, ' '))
        .filter(s => s.length > 0);

      if (nameCells.length === 0) {
        const sFields = {};
        stages.push({ name: stageLabel, fields: sFields });
        currentGroup = [{ fields: sFields }];
      } else {
        // Create one stage chip per distinct variant name found in the header row
        currentGroup = nameCells.map(name => {
          const sFields = { engines: { raw: name, value: name, unit: '', checked: true } };
          stages.push({ name, fields: sFields });
          return { fields: sFields };
        });
      }
      return;
    }

    // ── Data row ──────────────────────────────────────────────────────────────
    if (cells.length < 2) return;

    // cells[0] has rowspan ⟹ it's the section-spacer (first row of a stage block).
    // Subsequent rows within that rowspan omit the spacer, so indices shift left.
    const firstInBlock = cells[0].hasAttribute('rowspan');
    const labelIdx = firstInBlock ? 1 : 0;
    const unitIdx  = firstInBlock ? 2 : 1;
    if (cells.length <= unitIdx) return;

    const key     = nbTrim(cells[labelIdx].textContent).toLowerCase().replace(/\s+/g, ' ');
    const unitTxt = nbTrim(cells[unitIdx].textContent);

    if (currentGroup.length === 1) {
      // Single-variant: always take cells.last
      const numTxt = nbTrim(cells[cells.length - 1].textContent);
      const val    = unitTxt ? numTxt + ' ' + unitTxt : numTxt;
      _luMapB14643Field(key, val, currentGroup[0].fields);
    } else {
      // Multi-variant: map each stage to its positional column.
      // First-in-block: value cells = cells after [spacer,label,unit] WITHOUT rowspan
      //   (cells with rowspan are empty placeholder columns for absent variants)
      // Subsequent rows: value cells start at cells[labelIdx + 2]
      const valueCells = firstInBlock
        ? cells.slice(3).filter(c => !c.hasAttribute('rowspan'))
        : cells.slice(labelIdx + 2);

      for (let i = 0; i < currentGroup.length; i++) {
        const vc = valueCells[i];
        if (!vc) continue;
        const numTxt = nbTrim(vc.textContent);
        if (!numTxt) continue;
        const val = unitTxt ? numTxt + ' ' + unitTxt : numTxt;
        _luMapB14643Field(key, val, currentGroup[i].fields);
      }
    }
  });

  stages.forEach(s => _luDeriveProps(s.fields));
  _luDeriveProps(vehicleFields);

  const out = { ...vehicleFields };
  if (stages.length) { out._stages = stages; out._vehicleFields = vehicleFields; }
  return out;
}

function _luMapB14643Field(key, val, out) {
  if (!val || val.length > 300) return;
  const baseKey = key.replace(/\s*\(.*?\)\s*/g, '').trim();
  const isVac   = /vac/i.test(key);

  // "Name" row (second column of the gray stage header) — fallback if no designation found
  if (key === 'name') {
    const clean = val.replace(/\[.*?\]/g, '').trim();
    if (clean && !out.engines) out.engines = { raw: clean, value: clean, unit: '', checked: true };
    return;
  }
  // "Engines" row
  if (/^engines?$/.test(key)) {
    const clean = val.replace(/\[.*?\]/g, '').trim();
    if (clean) out.engines = { raw: clean, value: clean, unit: '', checked: true };
    return;
  }
  // "Propellant" = fuel type
  if (key === 'propellant') {
    out._propellant = val.replace(/\[.*?\]/g, '').trim();
    return;
  }
  // Liftoff weight (t or kg) → gross mass
  if (/liftoff weight/.test(key)) {
    const v = luParseKG(val);
    if (v) out.grossMass = { raw: val, value: v, unit: 'kg', checked: false };
    return;
  }
  // Propellant weight (t or kg)
  if (/propellant weight/.test(key)) {
    const v = luParseKG(val);
    if (v) out.prop = { raw: val, value: v, unit: 'kg', checked: true };
    return;
  }
  // Payload weight (vehicle-level, t or kg)
  if (/payload weight/.test(key)) {
    const v = luParseKG(val);
    if (v) out.payload = { raw: val, value: v, unit: 'kg', checked: true };
    return;
  }
  // Sustainer thrust (stage-and-a-half) — must precede general thrust handler
  if (/sustainer/.test(key) && /thrust/.test(baseKey)) {
    const v = luParseKN(val);
    if (v) out.sustThrust = { raw: val, value: v, unit: 'kN', checked: true };
    return;
  }
  // Sustainer Isp (stage-and-a-half)
  if (/sustainer/.test(key) && /specific impulse/.test(baseKey)) {
    const v = _luParseNskg(val);
    if (v) out.sustIsp = { raw: val, value: v, unit: 's', checked: true };
    return;
  }
  // Total thrust (kN) — prefer vacuum
  if (/total thrust/.test(baseKey)) {
    const v = luParseKN(val);
    if (v && (!out.thrust || isVac)) out.thrust = { raw: val, value: v, unit: 'kN', checked: true };
    return;
  }
  // Specific impulse (N*s/kg from site) → seconds (÷ g₀); prefer vacuum
  if (/specific impulse/.test(baseKey)) {
    const v = _luParseNskg(val);
    if (v && (!out.isp || isVac)) out.isp = { raw: val, value: v, unit: 's', checked: true };
    return;
  }
}

// Parse N·s/kg → seconds (Ve / g₀)
function _luParseNskg(text) {
  if (!text) return null;
  const m = String(text).replace(/,/g, '').match(/([\d.]+)/);
  return m ? Math.round(parseFloat(m[1]) / 9.80665) : null;
}

function _luParseAnx(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const out = {};
  doc.querySelectorAll('table tr').forEach(row => {
    const cells = row.querySelectorAll('td,th');
    if (cells.length >= 2) {
      const key = cells[0].textContent.trim().toLowerCase().replace(/\s+/g,' ');
      const val = cells[1].textContent.trim();
      _luMapField(key, val, out, 'anx');
    }
  });
  doc.querySelectorAll('table tr, p').forEach(el => _luScanText(el.textContent, out, 'anx'));
  _luDeriveProps(out);
  return out;
}

function _luParseSky(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const out = {};
  doc.querySelectorAll('table tr').forEach(row => {

function _luParseGeneric(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const out = {};
  doc.querySelectorAll('table tr').forEach(row => {
    const cells = row.querySelectorAll('td,th');
    if (cells.length >= 2) {
      const key = cells[0].textContent.trim().toLowerCase().replace(/\s+/g,' ');
      const val = cells[cells.length-1].textContent.trim();
      _luMapField(key, val, out, 'generic');
    }
  });
  doc.querySelectorAll('p, li, div').forEach(el => _luScanText(el.textContent, out, 'generic'));
  _luDeriveProps(out);
  return out;
}

// Derive missing mass field from the other two (gross, dry, prop)
function _luDeriveProps(out) {
  if (out.grossMass && out.dry && !out.prop) {
    const p = Math.round(out.grossMass.value - out.dry.value);
    if (p > 0) out.prop = { raw: `${out.grossMass.raw} − ${out.dry.raw}`, value: p, unit: 'kg', checked: true };
  }
  if (out.grossMass && out.prop && !out.dry) {
    const d = Math.round(out.grossMass.value - out.prop.value);
    if (d > 0) out.dry = { raw: `${out.grossMass.raw} − ${out.prop.raw}`, value: d, unit: 'kg', checked: true };
  }
}

// ── Field Mapping ─────────────────────────────────────────────────
const LU_STAGE_MAP = {
  dry:        { label: 'Dry Mass',           unit: 'kg',  formId: 'se-dry' },
  prop:       { label: 'Propellant',         unit: 'kg',  formId: 'se-prop' },
  thrust:     { label: 'Thrust (vac)',       unit: 'kN',  formId: 'se-thrust' },
  isp:        { label: 'Isp (vac)',          unit: 's',   formId: 'se-isp' },
  engines:    { label: 'Engine(s)',          unit: '',    formId: 'se-engines' },
  name:       { label: 'Name',              unit: '',    formId: 'se-name' },
  // Stage-and-a-half sustainer fields
  sustThrust: { label: 'Sust. Thrust (1½)', unit: 'kN',  formId: 'se-s15t' },
  sustIsp:    { label: 'Sust. Isp (1½)',    unit: 's',   formId: 'se-s15i' },
  jetMass:    { label: 'Jettison Mass (1½)',unit: 'kg',  formId: 'se-s15j' },
};
const LU_VEH_MAP = {
  name:      { label: 'Name',          unit: '',    formId: 've-name' },
  payload:   { label: 'Payload (LEO)', unit: 'kg',  formId: 've-payload' },
  note:      { label: 'Note',          unit: '',    formId: 've-note' },
};

// All synonym regexes are built as RegExp objects for readability
const _LU_RE = {
  // ── Mass: dry / empty / inert ─────────────────────────────────
  dry: /dry[\s\-]?(?:mass|weight|structure)|empty[\s\-]?(?:mass|weight)|inert[\s\-]?mass|unfuell?ed[\s\-]?(?:mass|weight)|burnout[\s\-]?(?:mass|weight)|structural[\s\-]?(?:mass|weight)|stage[\s\-]?(?:mass|weight)[\s\-]?(?:empty|dry)|mass[\s\-]?(?:empty|dry)|tare[\s\-]?(?:mass|weight)/,
  // ── Mass: gross / wet / fuelled ──────────────────────────────
  gross: /gross[\s\-]?(?:mass|weight)|(?:launch|lift[\s\-]?off|liftoff|take[\s\-]?off|takeoff|loaded|fuell?ed|wet|total|full)[\s\-]?(?:mass|weight)|mass[\s\-]?(?:at[\s\-]?)?(?:launch|liftoff|lift[\s\-]?off)|(?:mass|weight)[\s\-]?(?:full|loaded|fuell?ed)/,
  // ── Mass: propellant ─────────────────────────────────────────
  prop: /propellant[\s\-]?(?:mass|weight|load|capacity)|fuel(?:lant)?[\s\-]?(?:mass|weight|load)|oxidizer[\s\-]?(?:mass|weight)|oxidiser[\s\-]?(?:mass|weight)/,
  // ── Thrust ───────────────────────────────────────────────────
  thrust: /thrust|engine[\s\-]?(?:thrust|force)|total[\s\-]?thrust|rated[\s\-]?thrust|nominal[\s\-]?thrust/,
  thrustExclude: /twr|thrust[\s\-]?(?:to[\s\-]?weight|weight[\s\-]?ratio)|t\/w/,
  // ── Isp ──────────────────────────────────────────────────────
  isp: /specific[\s\-]?impulse|isp|i_?sp\b|exhaust[\s\-]?velocity/,
  // ── Engine / powerplant ───────────────────────────────────────
  engine: /^(?:engine|engines|engine[\s\-]?type|main[\s\-]?engine|propulsion|powerplant|motor|rocket[\s\-]?engine)/,
  // ── Payload ──────────────────────────────────────────────────
  payload: /payload[\s\-]?(?:capacity|mass|to[\s\-]?(?:leo|low[\s\-]?earth))|(?:leo|low[\s\-]?earth)[\s\-]?(?:payload|capacity)/,
};

function _luMapField(key, val, out, src) {
  if (!val || val.length > 200) return;

  // Dry / empty / unfuelled mass
  if (_LU_RE.dry.test(key)) {
    const v = luParseKG(val);
    if (v) out.dry = { raw: val, value: v, unit: 'kg', checked: true };
    return;
  }
  // Gross / wet / fuelled mass (reference for prop calculation)
  if (_LU_RE.gross.test(key)) {
    const v = luParseKG(val);
    if (v) out.grossMass = { raw: val, value: v, unit: 'kg', checked: false };
    return;
  }
  // Propellant mass (direct)
  if (_LU_RE.prop.test(key)) {
    const v = luParseKG(val);
    if (v) out.prop = { raw: val, value: v, unit: 'kg', checked: true };
    return;
  }
  // Thrust — prefer vacuum
  if (_LU_RE.thrust.test(key) && !_LU_RE.thrustExclude.test(key)) {
    const v = luParseKN(val);
    if (v) {
      const isVac = /vac/i.test(key + ' ' + val);
      if (!out.thrust || isVac) out.thrust = { raw: val, value: v, unit: 'kN', checked: true };
    }
    return;
  }
  // Isp — prefer vacuum
  if (_LU_RE.isp.test(key)) {
    const v = luParseSec(val);
    if (v) {
      const isVac = /vac/i.test(key + ' ' + val);
      if (!out.isp || isVac) out.isp = { raw: val, value: v, unit: 's', checked: true };
    }
    return;
  }
  // Engine name/type
  if (_LU_RE.engine.test(key) && !out.engines) {
    const clean = val.replace(/\[.*?\]/g,'').trim();
    if (clean && clean.length < 100) out.engines = { raw: clean, value: clean, unit: '', checked: true };
    return;
  }
  // Payload to LEO (vehicle)
  if (_LU_RE.payload.test(key)) {
    const v = luParseKG(val);
    if (v) out.payload = { raw: val, value: v, unit: 'kg', checked: true };
  }
}

// Free-text scan — handles "Label: value" patterns inside paragraphs
function _luScanText(text, out, src) {
  if (!text) return;
  const patterns = [
    // Gross / launch mass
    [/(?:gross|launch|liftoff|lift[\s-]?off|fuell?ed|wet|loaded|take[\s-]?off)\s*(?:mass|weight)\s*[:\-–]\s*([\d,.]+\s*(?:kg|lb|t\b|tonnes?|Mg))/gi,
      m => { const v=luParseKG(m[1]); if(v&&!out.grossMass) out.grossMass={raw:m[1],value:v,unit:'kg',checked:false}; }],
    // Dry / empty / unfuelled mass
    [/(?:dry|empty|inert|unfuell?ed|burnout)\s*(?:mass|weight)\s*[:\-–]\s*([\d,.]+\s*(?:kg|lb|t\b|tonnes?|Mg))/gi,
      m => { const v=luParseKG(m[1]); if(v&&!out.dry) out.dry={raw:m[1],value:v,unit:'kg',checked:true}; }],
    // Propellant mass
    [/propellant\s*(?:mass|load|weight)\s*[:\-–]\s*([\d,.]+\s*(?:kg|lb|t\b|tonnes?|Mg))/gi,
      m => { const v=luParseKG(m[1]); if(v&&!out.prop) out.prop={raw:m[1],value:v,unit:'kg',checked:true}; }],
    // Vacuum thrust
    [/vacuum\s*thrust\s*[:\-–]\s*([\d,.]+\s*(?:kN|MN|lbf|tf))/gi,
      m => { const v=luParseKN(m[1]); if(v) out.thrust={raw:m[1],value:v,unit:'kN',checked:true}; }],
    // Thrust (generic — only if vacuum not already found)
    [/(?:^|[;\n])[\s]*(?:thrust|engine\s*thrust)\s*[:\-–]\s*([\d,.]+\s*(?:kN|MN|lbf|tf))/gi,
      m => { const v=luParseKN(m[1]); if(v&&!out.thrust) out.thrust={raw:m[1],value:v,unit:'kN',checked:true}; }],
    // Vacuum Isp
    [/vacuum\s*(?:specific\s*impulse|isp)\s*[:\-–]\s*([\d.]+)\s*s/gi,
      m => { const v=parseFloat(m[1]); if(v) out.isp={raw:m[1]+'s',value:v,unit:'s',checked:true}; }],
    // Isp generic
    [/(?:specific\s*impulse|isp)\s*[:\-–]\s*([\d.]+)\s*s/gi,
      m => { const v=parseFloat(m[1]); if(v&&!out.isp) out.isp={raw:m[1]+'s',value:v,unit:'s',checked:true}; }],
    // Exhaust velocity → Isp approximation (Ve/9.80665)
    [/exhaust\s*velocity\s*[:\-–]\s*([\d,.]+)\s*(?:m\/s|m·s)/gi,
      m => { const v=Math.round(parseFloat(m[1].replace(/,/g,''))/9.80665); if(v&&!out.isp) out.isp={raw:m[0],value:v,unit:'s',checked:true}; }],
  ];
  patterns.forEach(([re,fn]) => { let m; re.lastIndex=0; while((m=re.exec(text))!==null) fn(m); });
}

// ── Unit parsers ──────────────────────────────────────────────────
function luParseKG(text) {
  if (!text) return null;
  text = String(text).replace(/,/g,'').replace(/\[.*?\]/g,'').trim();
  let m;
  // Metric tonnes / Mg (megagrams)
  if ((m=text.match(/([\d.]+)\s*(?:tonne?s?|Mg|t(?=[^fFa-zA-Z]|$))/i))) return Math.round(parseFloat(m[1])*1000);
  // kilograms
  if ((m=text.match(/([\d.]+)\s*kg/i)))    return Math.round(parseFloat(m[1]));
  // pounds (not lbf)
  if ((m=text.match(/([\d.]+)\s*lb(?!f)/i))) return Math.round(parseFloat(m[1])*0.453592);
  // bare number — assume kg
  if ((m=text.match(/^([\d.]+)$/)))         return Math.round(parseFloat(m[1]));
  return null;
}
function luParseKN(text) {
  if (!text) return null;
  text = String(text).replace(/,/g,'').replace(/\[.*?\]/g,'').trim();

  // Collapse "667.2 (+8.9)" additive-parenthetical patterns by summing the parts
  // (b14643 uses this for main thrust + vernier thrust, e.g. Thor: 667.2 (+8.9) kN)
  text = text.replace(/([\d.]+)\s*\(\s*\+\s*([\d.]+)\s*\)/g,
    (_, a, b) => String(Math.round((parseFloat(a) + parseFloat(b)) * 10) / 10));

  // Collect all (value, unit, position) matches from potentially multi-line cells
  const pat = /([\d.]+)\s*(MN|kN|tf|lbf)/gi;
  const hits = [];
  let m;
  while ((m = pat.exec(text)) !== null) {
    const num = parseFloat(m[1]);
    const unit = m[2];
    let val;
    if (/MN/i.test(unit))      val = Math.round(num * 1000 * 10) / 10;
    else if (/kN/i.test(unit)) val = Math.round(num * 10) / 10;
    else if (/tf/i.test(unit)) val = Math.round(num * 9.80665 * 10) / 10;
    else if (/lbf/i.test(unit)) val = Math.round(num * 0.0044482 * 10) / 10;
    if (val) {
      // Check ±40 chars around this match for "vac"/"vacuum"
      const ctx = text.slice(Math.max(0, m.index - 40), m.index + m[0].length + 40);
      hits.push({ val, vac: /vac/i.test(ctx) });
    }
  }

  if (!hits.length) return null;
  const vacHit = hits.find(h => h.vac);
  // Prefer vacuum value; otherwise last value (tends to be vacuum in SL / vac pairs)
  return vacHit ? vacHit.val : hits[hits.length - 1].val;
}
function luParseSec(text) {
  if (!text) return null;
  text = String(text).replace(/\[.*?\]/g,'');
  let m;
  // "311 s (vacuum)" or "(vacuum) 311 s" — prefer vacuum
  if ((m=text.match(/([\d.]+)\s*s[^a-z]*vac/i)))  return parseFloat(m[1]);
  if ((m=text.match(/vac[^a-z]*([\d.]+)\s*s/i)))  return parseFloat(m[1]);
  // Take last 's' value (tends to be vacuum in "SL / vac" pairs)
  const all = [...text.matchAll(/([\d.]+)\s*s\b/gi)];
  if (all.length) return parseFloat(all[all.length-1][1]);
  return null;
}

// ── Stage selection helpers ───────────────────────────────────────
// Returns the field map for idx: -1 = vehicle-level, 0+ = stage
function _luGetFields(idx) {
  if (idx >= 0 && _luExtracted._stages?.[idx]) {
    return _luExtracted._stages[idx].fields;
  }
  // Vehicle-level: use _vehicleFields if stages exist, else the whole extracted object
  return _luExtracted._vehicleFields ?? _luExtracted;
}

function luSelectStage(idx) {
  _luSelectedStage = idx;
  _luActiveFields = _luGetFields(idx);
  // Update chip active state
  document.querySelectorAll('.lu-stage-chip').forEach((el, i) => {
    // chips: index 0 = vehicle (-1), index 1+ = stage 0, 1, ...
    el.classList.toggle('active', (i === 0 && idx === -1) || (i === idx + 1));
  });
  _luRenderFieldTable();
}

// ── Render detail panel ───────────────────────────────────────────
function _luRenderDetail(sourceURL) {
  const stages = _luExtracted._stages;
  const hasStages = stages?.length > 0;

  // Build stage picker chips if this page has multiple stages
  let pickerHTML = '';
  if (hasStages) {
    const chips = [
      `<button class="lu-stage-chip${_luSelectedStage === -1 ? ' active' : ''}" onclick="luSelectStage(-1)">Vehicle</button>`
    ].concat(stages.map((s, i) =>
      `<button class="lu-stage-chip${_luSelectedStage === i ? ' active' : ''}" onclick="luSelectStage(${i})">${esc(s.name)}</button>`
    )).join('');
    pickerHTML = `<div class="lu-stage-picker">${chips}</div>`;
  }

  // Overall wrapper (stage picker + field table container)
  const noData = !hasStages && Object.keys(_luActiveFields).filter(k => !k.startsWith('_')).length === 0;
  if (noData) {
    document.getElementById('lu-detail').innerHTML =
      `<div class="lu-err">No structured data found on this page.<br><br>
       <a href="${esc(sourceURL)}" target="_blank" style="color:var(--accent);font-family:var(--mono);font-size:10px;">Open page in browser ↗</a></div>`;
    document.getElementById('lu-apply-note').textContent = 'No data extracted';
    return;
  }

  document.getElementById('lu-detail').innerHTML =
    pickerHTML +
    `<div id="lu-field-table-wrap">
       <div class="lu-section-title" style="display:flex;align-items:center;justify-content:space-between;">
         <span>Extracted Fields</span>
         <a href="${esc(sourceURL)}" target="_blank" style="color:var(--accent);font-family:var(--mono);font-size:8px;text-decoration:none;">Open source ↗</a>
       </div>
       <div id="lu-field-rows"></div>
     </div>`;

  _luRenderFieldTable();
}

function _luRenderFieldTable() {
  const map = _luMode === 'stage' ? LU_STAGE_MAP : LU_VEH_MAP;
  const fields = _luActiveFields;
  const keys = Object.keys(fields).filter(k => k !== 'grossMass' && !k.startsWith('_'));
  const gm = fields.grossMass;
  const hasData = keys.length > 0 || gm;

  const wrap = document.getElementById('lu-field-rows');
  if (!wrap) return;

  if (!hasData) {
    wrap.innerHTML = '<div class="lu-dim" style="padding:18px 0;">No data extracted for this stage.</div>';
    document.getElementById('lu-apply-note').textContent = 'No data for selection';
    return;
  }

  const rows = keys.map(k => {
    const f = fields[k];
    const mapped = map[k];
    const label = mapped ? mapped.label : k;
    return `<tr>
      <td><input type="checkbox" class="lu-cb" data-key="${esc(k)}" ${f.checked?'checked':''}></td>
      <td class="lu-fname">${esc(label)}</td>
      <td class="lu-fval">${esc(String(f.value))}${f.unit ? ' <span style="color:var(--text-dim);font-size:9px;">'+esc(f.unit)+'</span>' : ''}</td>
      <td class="lu-fmapped" style="color:var(--text-dim);font-size:10px;">${esc((f.raw||'').slice(0,60))}</td>
    </tr>`;
  }).join('');

  const gmRow = gm ? `<tr style="opacity:.5;">
    <td><input type="checkbox" class="lu-cb" data-key="grossMass"></td>
    <td class="lu-fname">Gross Mass (ref)</td>
    <td class="lu-fval">${gm.value} <span style="color:var(--text-dim);font-size:9px;">kg</span></td>
    <td class="lu-fmapped" style="font-size:10px;color:var(--text-dim);">${esc((gm.raw||'').slice(0,60))}</td>
  </tr>` : '';

  wrap.innerHTML = `<table class="lu-ftbl">
    <thead><tr><th></th><th>Field</th><th>Value</th><th>Raw text</th></tr></thead>
    <tbody>${rows}${gmRow}</tbody>
  </table>`;

  document.getElementById('lu-apply-note').textContent =
    `${keys.length} field${keys.length !== 1 ? 's' : ''} extracted`;
}

// ── Apply ─────────────────────────────────────────────────────────
function luApply() {
  const map = _luMode === 'stage' ? LU_STAGE_MAP : LU_VEH_MAP;
  const fields = _luActiveFields;
  let applied = 0;
  // Collect checked keys first so we can pre-enable s15 block if needed
  const checkedKeys = [...document.querySelectorAll('#lu-detail .lu-cb:checked')].map(cb => cb.dataset.key);
  const S15_KEYS = new Set(['sustThrust','sustIsp','jetMass']);
  if (checkedKeys.some(k => S15_KEYS.has(k))) {
    const cb15 = document.getElementById('se-s15');
    if (cb15 && !cb15.checked) { cb15.checked = true; seToggleS15(); }
  }
  checkedKeys.forEach(key => {
    if (key === 'grossMass') return;
    const f = fields[key];
    const m = map[key];
    const el = m ? document.getElementById(m.formId) : null;
    if (el && f) {
      el.value = f.value;
      el.dispatchEvent(new Event('input'));
      applied++;
    }
  });
  showToast(`Applied ${applied} field${applied !== 1 ? 's' : ''} to form`);
  closeLookup();
}

function luSelectAll(state) {
  document.querySelectorAll('#lu-detail .lu-cb').forEach(cb => cb.checked = state);
}
</script>
